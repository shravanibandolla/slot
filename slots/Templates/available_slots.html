{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<div class="header">
<h2>Available Slots</h2>
</div>

<div class="container">

<table>
<tr>
<th>ID</th>
<th>Time</th>
<th>Action</th>
</tr>

{% for slot in slots %}
<tr>
<td>{{ slot.id }}</td>
<td>{{ slot.time }}</td>
<td>
<a class="btn" onclick="confirmBooking()" href="/slots/book/{{slot.id}}/">
Book
</a>
</td>
</tr>
{% endfor %}
</table>

</div>
