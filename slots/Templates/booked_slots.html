{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<div class="header">
<h2>Booked Slots</h2>
</div>

<div class="container">

<table>
<tr>
<th>ID</th>
<th>Time</th>
</tr>

{% for slot in slots %}
<tr>
<td>{{ slot.id }}</td>
<td>{{ slot.time }}</td>
</tr>
{% endfor %}
</table>

</div>
