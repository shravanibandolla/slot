{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<div class="header">
<h2>Add Slot</h2>
</div>

<div class="container">

<form method="post">
{% csrf_token %}

Time <br>
<input type="text" name="time" required><br>

Status <br>
<select name="status">
<option value="available">Available</option>
<option value="booked">Booked</option>
</select>

<br><br>
<button class="btn" type="submit">Add Slot</button>

</form>

</div>
